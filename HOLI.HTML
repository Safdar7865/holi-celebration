<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi Celebration</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600&display=swap');

        :root {
            --holi-pink: #ff6b6b;
            --holi-yellow: #feca57;
            --holi-green: #1dd1a1;
            --holi-blue: #54a0ff;
            --holi-purple: #5f27cd;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1, h2 {
            font-family: 'Fredoka One', cursive;
            color: var(--holi-purple);
        }

        .hidden {
            display: none;
        }

        /* Quiz Styles */
        .question-box {
            margin-bottom: 20px;
        }
        
        .options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        .options button:hover {
            background: var(--holi-yellow);
            border-color: var(--holi-yellow);
            transform: scale(1.02);
        }

        /* Game Styles */
        .game-area {
            background: #f0f0f0;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 150px;
            position: relative;
            overflow: hidden;
        }

        #color-canvas {
            background: white;
            border: 2px dashed var(--holi-blue);
            cursor: crosshair;
            width: 100%;
            height: 200px;
            border-radius: 10px;
        }

        .spin-btn {
            background: var(--holi-pink);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Fredoka One', cursive;
            box-shadow: 0 5px 0 #d63031;
            transition: 0.1s;
        }

        .spin-btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }

        .wheel {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: conic-gradient(
                var(--holi-pink) 0deg 90deg, 
                var(--holi-yellow) 90deg 180deg, 
                var(--holi-green) 180deg 270deg, 
                var(--holi-blue) 270deg 360deg
            );
            margin: 0 auto 10px auto;
            transition: transform 3s cubic-bezier(0.25, 0.1, 0.25, 1);
            border: 4px solid white;
        }

        /* Wish Styles */
        .wish-text {
            font-size: 2.5rem;
            color: var(--holi-pink);
            text-shadow: 2px 2px 0px var(--holi-yellow);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }

        .next-btn {
            background: var(--holi-green);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- SECTION 1: QUIZ -->
        <div id="quiz-section">
            <h1>🎨 Holi Quiz Time!</h1>
            <p>Test your knowledge about the festival of colors.</p>
            
            <div id="question-container">
                <!-- Questions will be injected here by JS -->
            </div>
        </div>

        <!-- SECTION 2: GAMES -->
        <div id="games-section" class="hidden">
            <h1>🎮 Holi Fun Zone</h1>
            <p>Play these mini-games to celebrate!</p>

            <!-- Game 1: Color Splash -->
            <div class="game-area">
                <h3>Game 1: Color Splash</h3>
                <p>Click anywhere on the box to throw colors!</p>
                <canvas id="color-canvas"></canvas>
            </div>

            <!-- Game 2: Spin the Dhol -->
            <div class="game-area">
                <h3>Game 2: Spin the Dhol</h3>
                <div class="wheel" id="wheel"></div>
                <button class="spin-btn" onclick="spinWheel()">Spin!</button>
                <p id="wheel-result"></p>
            </div>
        </div>

        <!-- SECTION 3: WISH -->
        <div id="wish-section" class="hidden">
            <h1 class="wish-text">HAPPY HOLI TO YOU! 🌈</h1>
            <p style="font-size: 1.2rem;">May your life be as colorful as Holi.</p>
            <button class="next-btn" onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script>
        // --- QUIZ LOGIC ---
        const questions = [
            {
                q: "What is the festival of Holi primarily known as?",
                options: ["Festival of Lights", "Festival of Colors", "Festival of Harvest"],
                correct: 1
            },
            {
                q: "Which traditional sweet is most associated with Holi?",
                options: ["Gulab Jamun", "Thandai", "Ladoo"],
                correct: 1
            }
        ];

        let currentQ = 0;
        const questionContainer = document.getElementById('question-container');

        function loadQuestion() {
            if (currentQ < questions.length) {
                const q = questions[currentQ];
                let html = `<div class="question-box"><h2>Q${currentQ + 1}: ${q.q}</h2><div class="options">`;
                q.options.forEach((opt, index) => {
                    html += `<button onclick="checkAnswer(${index})">${opt}</button>`;
                });
                html += `</div></div>`;
                questionContainer.innerHTML = html;
            } else {
                showGames();
            }
        }

        function checkAnswer(selectedIndex) {
            if (selectedIndex === questions[currentQ].correct) {
                alert("Correct! 🎉");
                currentQ++;
                loadQuestion();
            } else {
                alert("Oops! Try again.");
            }
        }

        // --- GAME LOGIC ---
        
        // Game 1: Canvas Color Splash
        const canvas = document.getElementById('color-canvas');
        const ctx = canvas.getContext('2d');
        const colors = ['#ff6b6b', '#feca57', '#1dd1a1', '#54a0ff', '#5f27cd'];

        canvas.addEventListener('mousedown', function(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.fillStyle = randomColor;
            ctx.fill();
        });

        // Game 2: Spin Wheel
        function spinWheel() {
            const wheel = document.getElementById('wheel');
            const resultText = document.getElementById('wheel-result');
            const randomDeg = Math.floor(Math.random() * 360) + 720; // Spin at least 2 times
            wheel.style.transform = `rotate(${randomDeg}deg)`;
            
            resultText.innerText = "Spinning...";
            
            setTimeout(() => {
                resultText.innerText = "Colors are flying! 🌈";
                setTimeout(showWish, 1000);
            }, 3000);
        }

        // --- TRANSITION LOGIC ---
        function showGames() {
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('games-section').classList.remove('hidden');
        }

        function showWish() {
            document.getElementById('games-section').classList.add('hidden');
            document.getElementById('wish-section').classList.remove('hidden');
            createConfetti();
        }

        // --- CONFETTI EFFECT ---
        function createConfetti() {
            const colors = ['#ff6b6b', '#feca57', '#1dd1a1', '#54a0ff', '#5f27cd'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = Math.random() * 3 + 2 + 's';
                document.body.appendChild(confetti);
            }
        }

        // Initialize
        loadQuestion();

    </script>
</body>
</html>
